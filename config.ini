[colors]
background = #1e1e2e
background-alt = #313244
foreground = #cdd6f4
primary = #cba6f7
secondary = #89b4fa
alert = #f38ba8
disabled = #6c7086
green = #a6e3a1
peach = #fab387
yellow = #f9e2af
teal = #94e2d5

[bar/main]
monitor = ${env:MONITOR:HDMI-1}
width = 100%
height = 20pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
border-bottom-size = 2pt
border-bottom-color = ${colors.background-alt}
padding-left = 1
padding-right = 2
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}
font-0 = Hack Nerd Font:size=10;2
font-1 = Font Awesome 6 Free Solid:size=10;2
modules-left = i3
modules-center = date
modules-right = xkblayout pulseaudio memory cpu network tray powermenu
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3

[bar/secondary]
monitor = ${env:MONITOR:eDP-1}
width = 100%
height = 20pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
border-bottom-size = 2pt
border-bottom-color = ${colors.background-alt}
padding-left = 1
padding-right = 2
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}
font-0 = Hack Nerd Font:size=10;2
font-1 = Font Awesome 6 Free Solid:size=10;2
modules-left = i3
modules-center = date
modules-right = xkblayout pulseaudio memory cpu network powermenu
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3

[module/tray]
type = internal/tray
tray-spacing = 4px
tray-padding = 2px

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
label-focused = %index%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 2
label-unfocused = %index%
label-unfocused-padding = 2
label-visible = %index%
label-visible-padding = 2
label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = MUTED
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.teal}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.green}
label = %percentage:2%%

[module/network]
type = internal/network
interface = wlo1
interval = 1
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-connected = %{F#a6e3a1}%essid%%{F-} %{F#94e2d5}↓%downspeed%%{F-} %{F#fab387}↑%upspeed%%{F-}
label-disconnected = %{F#f38ba8}OFFLINE%{F-}

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M:%S
label = %{F#cba6f7}%date%%{F-}  %time%

[module/xkblayout]
type = internal/xkeyboard
format = <label-layout>
label-layout = %layout%
label-layout-foreground = #cba6f7

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/powermenu]
type = custom/text
content = "⏻"
content-foreground = #f38ba8
click-left = ~/.config/rofi/powermenu.sh
